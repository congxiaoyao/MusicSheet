<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>每书签独立 mask</title>
<link rel="stylesheet" href="/src/style.css" />
<style>
  body { padding: 40px; font-family: system-ui, sans-serif; }
  h1 { font-size: 17px; margin: 0 0 4px; }
  p.lead { color: var(--muted); font-size: 13px; margin: 0 0 16px; line-height: 1.6; max-width: 700px; }
  .demo-host { width: 100%; max-width: 700px; border: 1px dashed var(--line-2); border-radius: 10px; padding: 10px; background: #fcfcfd; margin-bottom: 20px; }
  .demo-label { font-size: 11px; color: var(--muted); margin-bottom: 8px; font-weight: 600; }
  .ms-wrap { position: relative; width: 100%; height: 64px; overflow: hidden; user-select: none; }
  .ms-track { position: relative; min-width: 100%; height: 64px; }
  .ms-blk {
    position: absolute; left: 0; top: 10px;
    width: 44px; height: 42px;
    display: flex; align-items: center; justify-content: center;
    background: #fff; border: 1px solid #d1d5db; border-radius: 10px;
    font-size: 15px; font-weight: 600; color: #3a3f4a;
    cursor: pointer;
  }
  .ms-sel { position: absolute; left: 0; top: 0; height: 62px; box-sizing: border-box; background: #f0f2ff; border-radius: 13px; z-index: 0; pointer-events: none; }
  .ms-sel-border { position: absolute; left: 0; top: 0; height: 62px; box-sizing: border-box; border: 2px solid rgba(99,102,241,0.55); border-radius: 13px; z-index: 3; pointer-events: none; }
  .ms-grip { position: absolute; left: 0; top: 20px; width: 5px; height: 22px; background: rgba(99,102,241,0.3); border-radius: 3px; z-index: 4; }
  .ctrl { margin: 12px 0; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .ctrl label { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
  .ctrl input[type=range] { width: 180px; }
  .ctrl button { font: inherit; font-size: 12px; padding: 4px 10px; border: 1px solid var(--line); background: var(--card); border-radius: 7px; cursor: pointer; }
  .info { font-size: 11px; color: var(--muted); font-family: ui-monospace, monospace; }
</style>
</head>
<body>
  <h1>每书签独立 mask</h1>
  <p class="lead">
    每个书签有自己的 mask-image。书签的框内部分 alpha=1(亮),框外部分 alpha=0.3(淡),框缘处渐变。<br>
    跨缘书签:左半在框内(亮),右半在框外(淡),mask 自动切割。<br>
    hover 书签 → 该书签 mask 变全 #000(全亮)。拖滑块看效果。
  </p>
  <div class="demo-host">
    <div class="demo-label">每书签独立 mask(hover 恢复)</div>
    <div class="ms-wrap"><div class="ms-track" id="track"></div></div>
  </div>
  <div class="ctrl">
    <label>选框位置 <input type="range" id="slider" min="0" max="400" value="131" step="1"></label>
    <label>选框宽度 <input type="range" id="wslider" min="60" max="350" value="137" step="1"></label>
    <button id="anim-btn">自动滑动</button>
    <span class="info" id="selinfo"></span>
  </div>

<script>
const BLOCK_W = 44, GAP = 15, PAD = 18, TOTAL = 8;
const blkX = i => PAD + i * (BLOCK_W + GAP);
const FADE = 24;
const DIM = 'rgba(0,0,0,0.3)';

const track = document.getElementById('track');
const slider = document.getElementById('slider');
const wslider = document.getElementById('wslider');
const info = document.getElementById('selinfo');
const animBtn = document.getElementById('anim-btn');

/** 算单个书签的 mask。统一构造色标,所有位置 clamp 到 [0,bw],无分支跳变。
 *  5 个区域(书签局部坐标):框外左(DIM) → 左缘渐变 → 框内(#000) → 右缘渐变 → 框外右(DIM)
 *  渐变带永远在,位置随选框缘移动(超出书签范围时 clamp),保证连续无跳变。 */
function blkMask(bx, bw, selX, selR, hovered) {
  const ALL = 'linear-gradient(to right, #000, #000)';
  if (hovered) return ALL;
  const sX = selX - bx;        // 左缘局部坐标(可负/超bw)
  const sR = selR - bx;        // 右缘局部坐标
  const c = v => Math.max(0, Math.min(bw, v));   // clamp 到 [0,bw]
  const L0 = c(0), L1 = c(sX), L2 = c(sX + FADE), R1 = c(sR - FADE), R2 = c(sR), R3 = c(bw);
  // 按顺序输出色标(去重相邻同色同位)
  const raw = [
    [L0, DIM], [L1, DIM], [L2, '#000'],
    [R1, '#000'], [R2, DIM], [R3, DIM]
  ];
  // 去掉位置相同的连续冗余(保留颜色变化点)
  const stops = [];
  for (const [pos, col] of raw) {
    if (stops.length === 0 || stops[stops.length-1][0] !== pos || stops[stops.length-1][1] !== col) {
      stops.push([pos, col]);
    }
  }
  return `linear-gradient(to right, ${stops.map(([p,c]) => `${c} ${p}px`).join(', ')})`;
}

function render() {
  const selX = parseInt(slider.value);
  const selW = parseInt(wslider.value);
  const selR = selX + selW;
  track.innerHTML = '';
  const sel = document.createElement('div'); sel.className = 'ms-sel';
  sel.style.transform = `translateX(${selX}px)`; sel.style.width = selW + 'px';
  track.appendChild(sel);
  const blkEls = [];
  for (let i = 0; i < TOTAL; i++) {
    const bx = blkX(i);
    const el = document.createElement('div'); el.className = 'ms-blk';
    el.style.transform = `translateX(${bx}px)`;
    el.textContent = i + 1;
    el.dataset.bx = bx;
    const m = blkMask(bx, BLOCK_W, selX, selR, false);
    el.style.webkitMaskImage = m;
    el.style.maskImage = m;
    el.addEventListener('mouseenter', () => {
      const hm = 'linear-gradient(to right, #000, #000)';
      el.style.webkitMaskImage = hm; el.style.maskImage = hm;
    });
    el.addEventListener('mouseleave', () => {
      const bx2 = parseFloat(el.dataset.bx);
      const sX = parseInt(slider.value), sW = parseInt(wslider.value);
      const m2 = blkMask(bx2, BLOCK_W, sX, sX + sW, false);
      el.style.webkitMaskImage = m2; el.style.maskImage = m2;
    });
    track.appendChild(el);
    blkEls.push(el);
  }
  const sb = document.createElement('div'); sb.className = 'ms-sel-border';
  sb.style.transform = `translateX(${selX}px)`; sb.style.width = selW + 'px';
  track.appendChild(sb);
  const gl = document.createElement('div'); gl.className = 'ms-grip';
  gl.style.transform = `translateX(${selX + 6}px)`;
  const gr = document.createElement('div'); gr.className = 'ms-grip';
  gr.style.transform = `translateX(${selR - 6 - 5}px)`;
  track.appendChild(gl); track.appendChild(gr);
  const addX = blkX(TOTAL - 1) + BLOCK_W + GAP;
  const add = document.createElement('div'); add.className = 'ms-blk';
  add.style.cssText += ';width:40px;border:1px dashed #bbb;color:#999;font-size:22px;';
  add.style.transform = `translateX(${addX}px)`; add.textContent = '+';
  track.appendChild(add);
  track._blkEls = blkEls;
  info.textContent = `selX=${selX} selR=${selR} selW=${selW}`;
}

function updateMasks() {
  const selX = parseInt(slider.value);
  const selW = parseInt(wslider.value);
  const selR = selX + selW;
  if (track._blkEls) {
    track._blkEls.forEach(el => {
      const bx = parseFloat(el.dataset.bx);
      const m = blkMask(bx, BLOCK_W, selX, selR, false);
      el.style.webkitMaskImage = m; el.style.maskImage = m;
    });
  }
  const sel = track.querySelector('.ms-sel');
  const sb = track.querySelector('.ms-sel-border');
  if (sel) { sel.style.transform = `translateX(${selX}px)`; sel.style.width = selW + 'px'; }
  if (sb) { sb.style.transform = `translateX(${selX}px)`; sb.style.width = selW + 'px'; }
  const grips = track.querySelectorAll('.ms-grip');
  if (grips[0]) grips[0].style.transform = `translateX(${selX + 6}px)`;
  if (grips[1]) grips[1].style.transform = `translateX(${selR - 6 - 5}px)`;
  info.textContent = `selX=${selX} selR=${selR} selW=${selW}`;
}

slider.addEventListener('input', updateMasks);
wslider.addEventListener('input', updateMasks);

let animRAF = null, animDir = 1;
animBtn.addEventListener('click', () => {
  if (animRAF) { cancelAnimationFrame(animRAF); animRAF = null; animBtn.textContent = '自动滑动'; return; }
  animBtn.textContent = '停止';
  const loop = () => {
    let v = parseInt(slider.value) + animDir * 2;
    if (v >= 400) { v = 400; animDir = -1; }
    if (v <= 0) { v = 0; animDir = 1; }
    slider.value = v; updateMasks();
    animRAF = requestAnimationFrame(loop);
  };
  loop();
});
render();
</script>
</body>
</html>
