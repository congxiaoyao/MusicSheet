<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>曲谱库 · 设计 demo</title>
<link rel="stylesheet" href="/src/style.css" />
<link rel="stylesheet" href="/src/ui/measure-selector.css" />
<style>
  /* ── demo 专属:曲谱库全屏视图 ──
     设计目标:像 Logic/GarageBand 启动项目选择器,而非标题栏附属控件。
     核心理念:卡片即入口(点卡片进曲子),卡片本身就是真实五线谱缩略图(一眼认出曲子)。 */

  .lib {
    max-width: 1280px;
    margin: 0 auto;
    padding: 28px 28px 60px;
  }

  /* 顶部:标题 + 工具条 */
  .lib-top {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 22px;
    flex-wrap: wrap;
  }
  .lib-title h1 {
    margin: 0 0 4px;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.02em;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .lib-title .count {
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    background: var(--accent-soft);
    padding: 2px 9px;
    border-radius: 20px;
  }
  .lib-title p {
    margin: 0;
    font-size: 13px;
    color: var(--muted);
  }

  /* 工具条:搜索 + 排序 + 视图 + 新建 */
  .lib-toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .lib-search {
    position: relative;
  }
  .lib-search input {
    font: inherit;
    font-size: 14px;
    width: 220px;
    padding: 9px 12px 9px 34px;
    border: 1px solid var(--line);
    border-radius: 20px;
    background: var(--card);
    color: var(--ink);
    outline: none;
    transition: all 0.16s;
  }
  .lib-search input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-ring);
    width: 260px;
  }
  .lib-search svg {
    position: absolute;
    left: 11px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
  }
  .lib-seg {
    display: flex;
    gap: 2px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 3px;
  }
  .lib-seg button {
    font: inherit;
    font-size: 13px;
    border: 0;
    background: transparent;
    color: var(--muted);
    padding: 6px 12px;
    border-radius: 16px;
    cursor: pointer;
    transition: all 0.14s;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .lib-seg button:hover { color: var(--ink); }
  .lib-seg button.active {
    background: var(--ink);
    color: #fff;
  }
  .lib-new {
    font: inherit;
    font-size: 14px;
    font-weight: 600;
    color: #fff;
    background: var(--accent);
    border: 0;
    border-radius: 20px;
    padding: 9px 16px 9px 13px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    box-shadow: 0 4px 12px rgba(79, 70, 229, 0.28);
    transition: transform 0.14s cubic-bezier(.34,1.56,.64,1), box-shadow 0.14s;
  }
  .lib-new:hover {
    transform: translateY(-1px) scale(1.02);
    box-shadow: 0 6px 18px rgba(79, 70, 229, 0.36);
  }
  .lib-new:active { transform: translateY(0) scale(0.99); }

  /* ── 网格视图 ── */
  .lib-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 18px;
  }
  /* 列表视图 */
  .lib-grid.list {
    grid-template-columns: 1fr;
    gap: 8px;
  }

  /* ── 曲谱卡片 ── */
  .score-card {
    position: relative;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.22s cubic-bezier(.34,1.4,.64,1), box-shadow 0.22s, border-color 0.16s;
    box-shadow: var(--shadow-sm);
    outline: none;
  }
  .score-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 32px rgba(16, 24, 40, 0.12);
    border-color: transparent;
  }
  .score-card.selected {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-ring), 0 12px 32px rgba(79, 70, 229, 0.18);
  }
  .score-card:focus-visible {
    box-shadow: 0 0 0 3px var(--accent-ring);
  }

  /* 缩略图:真实五线谱渲染(前两小节),卡片的核心识别区 */
  .sc-thumb {
    height: 110px;
    background: linear-gradient(180deg, #fcfcfd 0%, #f4f5f8 100%);
    border-bottom: 1px solid var(--line-2);
    overflow: hidden;
    position: relative;
    display: flex;
    align-items: center;
    padding: 6px 10px;
  }
  .sc-thumb svg {
    width: 100%;
    height: 100%;
    display: block;
    transition: transform 0.3s cubic-bezier(.34,1.3,.64,1);
  }
  .score-card:hover .sc-thumb svg { transform: scale(1.04); }
  /* 缩略图右下角:小节数徽章 */
  .sc-bars {
    position: absolute;
    right: 8px;
    bottom: 6px;
    font-size: 11px;
    font-weight: 600;
    color: var(--ink-2);
    background: rgba(255,255,255,0.88);
    backdrop-filter: blur(4px);
    padding: 2px 8px;
    border-radius: 10px;
    border: 1px solid var(--line-2);
  }
  /* 空曲谱:占位提示 */
  .sc-thumb.empty::after {
    content: '空曲谱';
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 13px;
  }

  /* 卡片信息区 */
  .sc-body {
    padding: 12px 14px 13px;
  }
  .sc-title-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 7px;
  }
  .sc-title {
    font-size: 15px;
    font-weight: 650;
    color: var(--ink);
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  /* 调号/拍号 徽章 */
  .sc-badges {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    margin-bottom: 8px;
  }
  .sc-badge {
    font-size: 11px;
    font-weight: 600;
    color: var(--ink-2);
    background: var(--bg);
    padding: 2px 8px;
    border-radius: 10px;
  }
  .sc-badge.key { color: var(--accent); background: var(--accent-soft); }
  .sc-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
  }
  /* 内容指示:已写多少小节(进度点) */
  .sc-fill {
    display: flex;
    gap: 3px;
    align-items: center;
  }
  .sc-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--line);
    transition: background 0.2s;
  }
  .sc-dot.filled { background: var(--accent); }

  /* 卡片操作浮层(hover 出现):重命名/复制/导出/删除 */
  .sc-actions {
    position: absolute;
    top: 8px;
    right: 8px;
    display: flex;
    gap: 4px;
    opacity: 0;
    transform: translateY(-4px);
    transition: opacity 0.16s, transform 0.16s;
  }
  .score-card:hover .sc-actions,
  .score-card.selected .sc-actions {
    opacity: 1;
    transform: translateY(0);
  }
  .sc-act {
    width: 28px;
    height: 28px;
    border: 0;
    border-radius: 7px;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(6px);
    color: var(--ink-2);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    box-shadow: var(--shadow-sm);
    transition: all 0.14s;
  }
  .sc-act:hover { background: var(--card); color: var(--accent); transform: scale(1.08); }
  .sc-act.danger:hover { color: #ef4444; }

  /* 新建占位卡:虚线边框,点开 inline 输入 */
  .score-card.new-card {
    border: 2px dashed var(--line);
    background: transparent;
    box-shadow: none;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 220px;
    color: var(--muted);
    transition: all 0.18s;
  }
  .score-card.new-card:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-soft);
    transform: translateY(-2px);
  }
  .new-card-inner {
    text-align: center;
  }
  .new-card-inner .plus {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--accent-soft);
    color: var(--accent);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    margin-bottom: 8px;
    transition: transform 0.25s cubic-bezier(.34,1.56,.64,1);
  }
  .score-card.new-card:hover .plus { transform: rotate(90deg) scale(1.1); }

  /* 列表视图下的卡片:横向布局 */
  .lib-grid.list .score-card {
    display: flex;
    align-items: stretch;
    min-height: 64px;
  }
  .lib-grid.list .sc-thumb {
    width: 140px;
    height: auto;
    border-bottom: 0;
    border-right: 1px solid var(--line-2);
    flex-shrink: 0;
  }
  .lib-grid.list .sc-body {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .lib-grid.list .sc-title-row { margin: 0; flex: 1; }
  .lib-grid.list .sc-badges,
  .lib-grid.list .sc-meta { margin: 0; }
  .lib-grid.list .new-card { min-height: 64px; }

  /* 进入曲谱的过渡(点卡片 → 假装进入编辑) */
  .lib-entering {
    animation: libFade 0.4s ease forwards;
  }
  @keyframes libFade {
    to { opacity: 0; transform: scale(0.96); }
  }

  /* 空状态:无搜索结果 */
  .lib-empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .lib-empty .big { font-size: 40px; margin-bottom: 12px; opacity: 0.4; }

  /* hint 条 */
  .lib-hint {
    margin-top: 28px;
    padding: 12px 16px;
    background: var(--accent-soft);
    border-radius: var(--radius-sm);
    font-size: 12px;
    color: var(--ink-2);
    line-height: 1.7;
  }
  .lib-hint kbd {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 11px;
    font-family: ui-monospace, monospace;
    box-shadow: 0 1px 0 var(--line);
  }

  /* ── 进入曲子视图:小节管理 ── */
  .score-view { padding-bottom: 40px; }

  /* MeasureSelector 组件样式见 /src/ui/measure-selector.css */

  .appbar {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 8px 0 20px;
    margin-bottom: 8px;
    border-bottom: 1px solid var(--line-2);
  }
  .appbar-back {
    font: inherit;
    font-size: 14px;
    font-weight: 600;
    color: var(--ink-2);
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 22px;
    padding: 9px 16px 9px 12px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: all 0.16s cubic-bezier(.34,1.3,.64,1);
  }
  .appbar-back:hover { border-color: var(--accent); color: var(--accent); transform: translateX(-2px); }
  .appbar-back:active { transform: translateX(0); }
  .appbar-center {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
  }
  .appbar-name {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.01em;
    outline: none;
    border-radius: 6px;
    padding: 2px 6px;
    margin-left: -6px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 100%;
  }
  .appbar-name:focus { background: var(--accent-soft); box-shadow: 0 0 0 2px var(--accent-ring); }
  .appbar-badge {
    font-size: 12px;
    font-weight: 600;
    color: var(--ink-2);
    background: var(--bg);
    padding: 3px 10px;
    border-radius: 12px;
    flex-shrink: 0;
  }
  .appbar-badge.key { color: var(--accent); background: var(--accent-soft); }
  /* 视图模式 radio(高音/低音/双谱/预览) */
  .appbar-view {
    display: flex;
    gap: 2px;
    background: var(--bg);
    border-radius: 20px;
    padding: 3px;
    margin-left: 4px;
  }
  .appbar-vbtn {
    font: inherit;
    font-size: 17px;
    border: 0;
    background: transparent;
    color: var(--muted);
    padding: 5px 12px;
    border-radius: 16px;
    cursor: pointer;
    transition: all 0.14s;
    line-height: 1;
    min-width: 36px;
  }
  .appbar-vbtn:hover { color: var(--ink); }
  .appbar-vbtn.active { background: var(--card); color: var(--accent); box-shadow: var(--shadow-sm); font-weight: 600; }
  .appbar-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  .appbar-act {
    font: inherit;
    font-size: 18px;
    font-weight: 600;
    width: 32px; height: 32px;
    line-height: 1;
    color: var(--ink-2);
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 8px;
    cursor: pointer;
    padding: 0;
    transition: all 0.14s;
  }
  .appbar-act:hover { border-color: var(--accent); color: var(--accent); }
  .appbar-count { font-size: 14px; font-weight: 650; min-width: 24px; text-align: center; }
  .appbar-sep { width: 1px; height: 22px; background: var(--line); margin: 0 4px; }
  .appbar-preview {
    font: inherit;
    font-size: 13px;
    font-weight: 600;
    color: var(--ink-2);
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 8px 14px;
    cursor: pointer;
    transition: all 0.14s;
  }
  .appbar-preview:hover { border-color: var(--accent); color: var(--accent); }
  .sv-top {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 6px 0 18px;
    flex-wrap: wrap;
  }
  .sv-back {
    font: inherit;
    font-size: 14px;
    color: var(--ink-2);
    background: transparent;
    border: 0;
    cursor: pointer;
    padding: 6px 8px;
    border-radius: 8px;
    display: inline-flex;
    align-items: center;
    gap: 2px;
    transition: all 0.14s;
  }
  .sv-back:hover { background: var(--bg); color: var(--accent); }
  .sv-title {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
    min-width: 0;
  }
  .sv-name {
    font-size: 19px;
    font-weight: 700;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .sv-badge {
    font-size: 11px;
    font-weight: 600;
    color: var(--ink-2);
    background: var(--bg);
    padding: 2px 8px;
    border-radius: 10px;
  }
  .sv-badge.key { color: var(--accent); background: var(--accent-soft); }
  .sv-top-actions { display: flex; align-items: center; gap: 10px; }
  /* 工具栏小节数控件(曲子属性,和调号拍号同级语义) */
  .sv-barctrl {
    display: inline-flex;
    align-items: center;
    gap: 2px;
    background: var(--bg);
    border-radius: var(--radius-sm);
    padding: 3px 6px 3px 10px;
  }
  .sv-barctrl-label { font-size: 12px; color: var(--muted); margin-right: 4px; }
  .sv-mini {
    font: inherit;
    font-size: 16px;
    font-weight: 600;
    width: 26px; height: 26px;
    color: var(--ink-2);
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 6px;
    cursor: pointer;
    padding: 0;
    line-height: 1;
  }
  .sv-mini:hover { border-color: var(--accent); color: var(--accent); }
  .sv-barcount { font-size: 14px; font-weight: 650; min-width: 24px; text-align: center; }
  .sv-preview {
    font: inherit;
    font-size: 13px;
    color: var(--ink-2);
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 7px 14px;
    cursor: pointer;
    transition: all 0.14s;
  }
  .sv-preview:hover { border-color: var(--accent); color: var(--accent); }

  /* 小节缩略图条 */
  /* 小节条:数字方块 + 可拖拽吸附选择框 */
  .sv-barwrap {
    margin-bottom: 18px;
  }
  .sv-measures {
    position: relative;
    overflow-x: auto;
    overflow-y: visible;
    padding: 4px 4px 6px;
    user-select: none;
  }
  .sv-measures::-webkit-scrollbar { height: 6px; }
  .sv-measures::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }
  .sv-m-track {
    display: flex;
    align-items: stretch;
    gap: 6px;
    width: max-content;
    min-width: 100%;
  }
  .sv-m {
    flex: 0 0 44px;
    height: 38px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 9px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.14s cubic-bezier(.34,1.3,.64,1);
    position: relative;
  }
  .sv-m:hover { border-color: var(--accent); transform: translateY(-1px); }
  /* hover 出现的删除叉(右上角) */
  .sv-m-del {
    position: absolute;
    top: -5px; right: -5px;
    width: 18px; height: 18px;
    border: 0;
    border-radius: 50%;
    background: #ef4444;
    color: #fff;
    font-size: 13px;
    font-weight: 700;
    line-height: 16px;
    padding: 0;
    cursor: pointer;
    opacity: 0;
    transform: scale(0.6);
    transition: opacity 0.14s, transform 0.14s cubic-bezier(.34,1.56,.64,1);
    z-index: 5;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .sv-m:hover .sv-m-del { opacity: 1; transform: scale(1); }
  .sv-m-del:hover { background: #dc2626; transform: scale(1.12); }
  /* 选中区里的方块 hover 删除叉更显眼 */
  .sv-m.in-sel:hover .sv-m-del { opacity: 1; }
  .sv-m-num {
    font-size: 14px;
    font-weight: 600;
    color: var(--ink-2);
  }
  /* 有内容的方块:数字下方加一个 accent 圆点 */
  .sv-m.has-content::after {
    content: '';
    position: absolute;
    bottom: 5px; left: 50%;
    transform: translateX(-50%);
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--accent);
  }
  /* 末尾加小节 */
  .sv-m-add {
    border-style: dashed;
    color: var(--muted);
    font-size: 20px;
  }
  .sv-m-add:hover { color: var(--accent); border-color: var(--accent); }
  /* 可拖拽吸附选择框:框住当前编辑的小节。
     关键:背景半透明 + 数字方块在它之上(避免盖住数字)。
     选择框只做"框线 + 左右把手"指示,不挡内容。 */
  .sv-selector {
    position: absolute;
    border: 2px solid var(--accent);
    border-radius: 13px;
    background: rgba(79, 70, 229, 0.06);   /* 极淡,不挡数字 */
    box-sizing: border-box;
    pointer-events: auto;
    cursor: grab;
    transition: left 0.12s cubic-bezier(.34,1.3,.64,1), width 0.12s cubic-bezier(.34,1.3,.64,1), box-shadow 0.14s;
    box-shadow: 0 4px 12px rgba(79,70,229,0.14);
    z-index: 1;   /* 在数字方块(track 内)之下 */
  }
  /* 选中区内的方块:轻微 accent 底,强化"这几小节在编辑"语义,但仍清晰可读 */
  .sv-m.in-sel {
    background: rgba(79, 70, 229, 0.08);
    border-color: rgba(79, 70, 229, 0.4);
    z-index: 2;   /* 数字方块在选择框之上,绝不被盖 */
    position: relative;
  }
  .sv-selector.dragging { transition: none; cursor: grabbing; box-shadow: 0 6px 18px rgba(79,70,229,0.28); }
  /* 左右边缘拖拽 handle(竖条),hover/drag 时显现 */
  .sv-selector::before, .sv-selector::after {
    content: '';
    position: absolute;
    top: 50%; transform: translateY(-50%);
    width: 4px; height: 20px;
    background: var(--accent);
    border-radius: 2px;
    opacity: 0.5;
    transition: opacity 0.14s;
    z-index: 3;
  }
