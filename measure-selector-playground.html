<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MeasureSelector 调试场</title>
<link rel="stylesheet" href="/src/style.css" />
<link rel="stylesheet" href="/src/ui/measure-selector.css" />
<style>
  body { padding: 24px; max-width: 1100px; margin: 0 auto; font-family: system-ui, sans-serif; }
  h1 { font-size: 18px; margin: 0 0 4px; }
  p.lead { color: var(--muted); font-size: 12px; margin: 0 0 16px; line-height: 1.6; }
  .controls { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 12px; padding: 10px 12px; background: var(--card); border: 1px solid var(--line); border-radius: 10px; }
  .controls label { font-size: 12px; color: var(--muted); display: inline-flex; align-items: center; gap: 4px; }
  .controls input[type=number] { width: 56px; font: inherit; font-size: 13px; padding: 4px 6px; border: 1px solid var(--line); border-radius: 6px; }
  .controls button, .scene button { font: inherit; font-size: 12px; padding: 5px 10px; border: 1px solid var(--line); background: var(--card); border-radius: 7px; cursor: pointer; }
  .controls button:hover, .scene button:hover { border-color: var(--accent); color: var(--accent); }
  .scene { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
  .scene .lbl { font-size: 11px; color: var(--muted); align-self: center; margin-right: 4px; }
  /* 组件容器:模拟 library-demo 的 sv-tools-measures(host flex:1 撑满) */
  .ms-host { width: 100%; max-width: 760px; border: 1px dashed var(--line-2); border-radius: 10px; padding: 10px; background: #fcfcfd; }
  .readout { margin-top: 16px; font-size: 11px; line-height: 1.5; color: var(--ink-2); background: var(--bg); border-radius: 8px; padding: 10px 12px; font-family: ui-monospace, monospace; white-space: pre; max-height: 320px; overflow: auto; }
  .ruler { position: relative; height: 18px; margin-top: 4px; border-top: 1px solid var(--line-2); max-width: 760px; }
  .ruler span { position: absolute; top: 2px; font-size: 9px; color: var(--muted); transform: translateX(-50%); }
</style>
</head>
<body>
  <h1>MeasureSelector 调试场</h1>
  <p class="lead">隔离调试组件 + 真机验收跨格动画。改 total/start/count 或点预设场景,实时读数对照。<b>真机重点</b>:① 拖把手/框体跨格是否丝滑(不瞬移);② 触屏 hover 删除叉是否可用;③ 快速拖拽是否丢帧。</p>

  <div class="controls">
    <label>total <input type="number" id="ctl-total" value="6" min="1" max="256"></label>
    <label>start <input type="number" id="ctl-start" value="2" min="0"></label>
    <label>count <input type="number" id="ctl-count" value="2" min="1"></label>
    <button id="ctl-apply">应用</button>
    <button id="ctl-add">+ 末尾加</button>
    <button id="ctl-del">− 删末尾</button>
    <label><input type="checkbox" id="ctl-content" checked> 随机内容点</label>
    <button id="ctl-scroll-right">滚到右侧</button>
  </div>

  <div class="scene">
    <span class="lbl">预设场景:</span>
    <button data-scene="1A">1A 拖右扩</button>
    <button data-scene="1B">1B 拖右缩</button>
    <button data-scene="1C">1C 拖左移</button>
    <button data-scene="2A">2A 拖框体右</button>
    <button data-scene="2B">2B 拖框体左</button>
    <button data-scene="full">全选</button>
    <button data-scene="one">只剩1</button>
    <button data-scene="scroll">横滑16</button>
  </div>

  <div class="ms-host" id="ms-host"></div>
  <div class="ruler" id="ruler"></div>
  <pre class="readout" id="readout"></pre>

  <script type="module" src="/src/ms-playground.ts"></script>
</body>
</html>
