<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>选框边缘 fade — 静态效果</title>
<link rel="stylesheet" href="/src/style.css" />
<style>
  body { padding: 40px; font-family: system-ui, sans-serif; }
  h1 { font-size: 17px; margin: 0 0 4px; }
  p.lead { color: var(--muted); font-size: 13px; margin: 0 0 20px; line-height: 1.6; max-width: 700px; }

  /* 组件容器:模拟 library-demo 的 measure-selector */
  .demo-host { width: 100%; max-width: 700px; border: 1px dashed var(--line-2); border-radius: 10px; padding: 10px; background: #fcfcfd; margin-bottom: 24px; }
  .demo-label { font-size: 11px; color: var(--muted); margin-bottom: 8px; font-weight: 600; }

  .ms-wrap {
    position: relative; width: 100%; height: 64px;
    overflow: hidden;   /* 裁掉超出容器的内容 */
    user-select: none;
  }
  .ms-track { position: relative; min-width: 100%; height: 64px; }  /* track 高度=组件高(非1px) */

  /* 书签层:带 mask,选框缘外 fade */
  .ms-blocks-layer {
    position: absolute; left: 0; top: 0; width: 100%; height: 100%;
    z-index: 1;
    /* mask 由 JS 动态设 */
  }
  .ms-blk {
    position: absolute; left: 0; top: 10px;
    width: 44px; height: 42px;
    display: flex; align-items: center; justify-content: center;
    background: #fff; border: 1px solid #d1d5db; border-radius: 10px;
    font-size: 15px; font-weight: 600; color: #3a3f4a;
  }
  .ms-blk.in { background: #eef2ff; border-color: rgba(99,102,241,0.4); }

  /* 选框 */
  .ms-sel {
    position: absolute; left: 0; top: 0; height: 62px; box-sizing: border-box;
    background: #f0f2ff; border-radius: 13px; z-index: 0; pointer-events: none;
  }
  .ms-sel-border {
    position: absolute; left: 0; top: 0; height: 62px; box-sizing: border-box;
    border: 2px solid rgba(99,102,241,0.55); border-radius: 13px;
    box-shadow: 0 3px 10px rgba(79,70,229,0.15); z-index: 3; pointer-events: none;
  }
  .ms-grip {
    position: absolute; left: 0; top: 20px; width: 5px; height: 22px;
    background: rgba(99,102,241,0.3); border-radius: 3px; z-index: 4;
  }

  /* + 按钮 */
  .ms-add {
    position: absolute; left: 0; top: 10px; width: 40px; height: 42px;
    display: flex; align-items: center; justify-content: center;
    border: 1px dashed #bbb; border-radius: 10px; color: #999; font-size: 22px;
  }
</style>
</head>
<body>
  <h1>选框边缘 fade 效果</h1>
  <p class="lead">
    书签层用 CSS mask,选框缘外 24px 范围渐变淡出(alpha→0.2)。选框内书签全显示。<br>
    拖动滑块改变选框位置,看选框缘外的书签渐变淡出/淡入。<br>
    <b>对比</b>:下面一行有 fade,上面一行无 fade(对照)。
  </p>

  <div class="demo-host">
    <div class="demo-label">对照(无 fade):书签全显示</div>
    <div class="ms-wrap" id="wrap-nofade">
      <div class="ms-track" id="track-nofade"></div>
    </div>
  </div>

  <div class="demo-host">
    <div class="demo-label">选框边缘 fade(拖滑块改变选框位置)</div>
    <div class="ms-wrap" id="wrap-fade">
      <div class="ms-track" id="track-fade"></div>
    </div>
  </div>

  <div style="margin: 16px 0;">
    <label style="font-size:13px; color:var(--muted)">选框起点: <input type="range" id="slider" min="0" max="4" value="2" step="1" style="width:200px"></label>
    <span id="selinfo" style="font-size:12px; color:var(--muted); margin-left:12px"></span>
  </div>

<script type="module">
const BLOCK_W = 44, GAP = 15, PAD = 18, SEL_PAD = 6, HANDLE_W = 5, GRIP_GAP = 6, TOTAL = 8;

// 算几何:start/count → 所有位置
function layout(start, count) {
  const blks = [];
  let x = PAD;
  for (let i = 0; i < start; i++) { blks.push({ idx: i, x }); x += BLOCK_W + GAP; }
  const selX = x;
  const selW = SEL_PAD*2 + HANDLE_W*2 + GRIP_GAP*2 + count*BLOCK_W + (count-1)*GAP;
  const selR = selX + selW;
  const innerStart = selX + SEL_PAD + HANDLE_W + GRIP_GAP;
  for (let k = 0; k < count; k++) blks.push({ idx: start+k, x: innerStart + k*(BLOCK_W+GAP), in: true });
  x = selR + GAP;
  for (let i = start+count; i < TOTAL; i++) { blks.push({ idx: i, x }); x += BLOCK_W + GAP; }
  const addX = x;
  const gripL = selX + SEL_PAD, gripR = selR - SEL_PAD - HANDLE_W;
  return { blks, selX, selR, selW, addX, gripL, gripR };
}

function render(track, start, count, withFade) {
  const L = layout(start, count);
  // 清空
  track.innerHTML = '';
  const wrap = document.createElement('div'); wrap.style.cssText='position:absolute;left:0;top:0;width:100%;height:100%';
  // 选框底色
  const sel = document.createElement('div'); sel.className='ms-sel';
  sel.style.transform=`translateX(${L.selX}px)`; sel.style.width=L.selW+'px';
  track.appendChild(sel);
  // 书签层
  const bl = document.createElement('div'); bl.className='ms-blocks-layer';
  L.blks.forEach(b => {
    const el = document.createElement('div'); el.className='ms-blk'+(b.in?' in':'');
    el.style.transform=`translateX(${b.x}px)`; el.textContent=b.idx+1;
    bl.appendChild(el);
  });
  track.appendChild(bl);
  // 选框边框
  const sb = document.createElement('div'); sb.className='ms-sel-border';
  sb.style.transform=`translateX(${L.selX}px)`; sb.style.width=L.selW+'px';
  track.appendChild(sb);
  // 把手
  const gl = document.createElement('div'); gl.className='ms-grip'; gl.style.transform=`translateX(${L.gripL}px)`;
  const gr = document.createElement('div'); gr.className='ms-grip'; gr.style.transform=`translateX(${L.gripR}px)`;
  track.appendChild(gl); track.appendChild(gr);
  // add
  const add = document.createElement('div'); add.className='ms-add'; add.style.transform=`translateX(${L.addX}px)`; add.textContent='+';
  track.appendChild(add);
  // mask:只作用书签层
  if (withFade) {
    const fade = 24;
    const mask = `linear-gradient(to right, #000 0, #000 ${L.selX-fade}px, rgba(0,0,0,0.2) ${L.selX}px, #000 ${L.selX}px, #000 ${L.selR}px, rgba(0,0,0,0.2) ${L.selR}px, #000 ${L.selR+fade}px, #000 100%)`;
    bl.style.webkitMaskImage = mask;
    bl.style.maskImage = mask;
  }
  return L;
}

const tn = document.getElementById('track-nofade');
const tf = document.getElementById('track-fade');
const slider = document.getElementById('slider');
const info = document.getElementById('selinfo');

function update() {
  const start = parseInt(slider.value);
  const count = 2;
  render(tn, start, count, false);
  render(tf, start, count, true);
  info.textContent = `选框 [${start+1}, ${start+2}]`;
}
slider.addEventListener('input', update);
update();
</script>
</body>
</html>
